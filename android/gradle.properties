org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Kotlin incremental compilation optimizations
kotlin.incremental=true
kotlin.incremental.usePreciseJavaTracking=true
kotlin.caching.enabled=true
kotlin.parallel.tasks.in.project=true

# Gradle build cache
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configureondemand=false

# Android build optimizations
# android.enableBuildCache=true  # REMOVED: Deprecated in Android Gradle Plugin 7.0+
